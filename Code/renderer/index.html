<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helper Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Top Navbar with All Controls -->
    <div class="top-navbar">

      <!-- Search Bar -->
      <div class="navbar-section search-section">
        <input
          type="text"
          id="treeSearchInput"
          placeholder="Search folder/file..."
          class="search-input"
        />
        <ul id="searchSuggestions" class="search-suggestions"></ul>
      </div>

      <!-- Left Section: Repo Selection -->
      <div class="navbar-section">
        <button id="selectRepoBtn" class="primary-btn">
          <span class="btn-icon">📁</span>
          Select Repo
        </button>

        <!-- NEW: Refresh Button -->
        <button id="refreshBtn" class="tool-btn refresh-btn" title="Refresh folder tree">
          <span class="btn-icon refresh-icon">🔄</span>
          Refresh
        </button>

        <span id="activeRepoName" class="repo-name">No repo selected</span>
      </div>

      <!-- Center Section: Action Buttons -->
      <div class="navbar-section center">
        <button id="structureBtn" class="action-btn">
          <span class="btn-icon">🌳</span>
          Structure
        </button>
        <button id="codeBtn" class="action-btn">
          <span class="btn-icon">💻</span>
          Code
        </button>
        <button id="generateBtn" class="action-btn generate-btn">
          <span class="btn-icon">⚡</span>
          Generate
        </button>
      </div>

      <!-- Right Section: Tools & Progress -->
      <div class="navbar-section right">
        <!-- Selection Counter -->
        <div class="selection-counter">
          <span class="counter-icon">✓</span>
          <span id="selectionCount">0</span>
          <span class="counter-label">selected</span>
        </div>

        <!-- Clear Selection Button -->
        <button id="clearSelectionBtn" class="tool-btn clear-btn" title="Clear All Selections">
          <span class="btn-icon">✕</span>
          Clear
        </button>

        <button id="editDocignoreBtn" class="tool-btn" title="Edit Global Ignore">
          <span class="btn-icon">⚙️</span>
          Ignore
        </button>
        <button id="openStorageBtn" class="tool-btn" title="Open Storage Folder">
          <span class="btn-icon">📂</span>
          Storage
        </button>

        <!-- Progress Indicator -->
        <div class="progress-container">
          <progress id="progressBar" value="0" max="100"></progress>
          <span id="progressText">0%</span>
        </div>
      </div>
    </div>

    <!-- NEW: Extension Filter Bar -->
    <div class="filter-bar" id="filterContainer">
      <span class="filter-label">🔍 Filter by extension:</span>
      <div class="filter-input-wrap">
        <input
          type="text"
          id="filterInput"
          placeholder="e.g. js, ts, html..."
          class="filter-text-input"
          autocomplete="off"
        />
        <ul id="extSuggestions" class="ext-suggestions"></ul>
      </div>
      <div id="activeFilters" class="active-filters"></div>
    </div>

    <!-- Tree view -->
    <div class="tree-view-container">
      <div id="treeContainer">Select a repo to view files</div>
    </div>

  </div>

  <!-- App logic -->
  <script type="module" src="app.js"></script>
</body>
</html>
